<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <title>Website Banners | Udhav Khera</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "DM Sans", sans-serif;
      background: #0b0b0b;
      color: #ffffff;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 107, 53, 0.14), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.05), transparent 35%),
        linear-gradient(180deg, #101010 0%, #070707 100%);
      z-index: -1;
    }

    .page-header {
      width: min(100% - 50px, 1200px);
      margin: 0 auto;
      padding: 55px 0 25px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: rgba(255, 255, 255, 0.75);
      font-size: 14px;
      margin-bottom: 35px;
      transition: 0.3s ease;
    }

    .back-btn:hover {
      color: #ff6b35;
      transform: translateX(-4px);
    }

    .project-tag {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 107, 53, 0.14);
      color: #ff6b35;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .page-title {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(48px, 8vw, 92px);
      line-height: 0.95;
      letter-spacing: 2px;
      margin-bottom: 18px;
    }

    .page-title span {
      color: #ff6b35;
    }

    .page-desc {
      max-width: 620px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 17px;
      line-height: 1.7;
    }

    .gallery-section {
      width: min(100% - 50px, 1220px);
      margin: 0 auto;
      padding: 35px 0 90px;
    }

    .vlog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .vlog-card {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    }

    .vlog-card:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 107, 53, 0.55);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.48);
    }

    .vlog-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #111111;
    }

    .vlog-thumb img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.45s ease, filter 0.45s ease;
    }

    .vlog-card:hover .vlog-thumb img {
      transform: scale(1.06);
      filter: brightness(0.88);
    }

    @media (max-width: 950px) {
      .vlog-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .page-header,
      .gallery-section {
        width: min(100% - 30px, 100%);
      }

      .page-header {
        padding-top: 40px;
      }

      .vlog-grid {
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .page-desc {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

  <header class="page-header">
    <a href="./index.html#work" class="back-btn">
      <i class="fas fa-arrow-left"></i>
      Back to Work
    </a>

    <span class="project-tag">Web Design</span>

    <h1 class="page-title">
      Website <span>Banners</span>
    </h1>

    <p class="page-desc">
      A collection of professional website banner designs created for tutorials,
      programming content, and digital learning platforms.
    </p>
  </header>

  <section class="gallery-section" id="banners">
    <div class="vlog-grid">

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/CSS%20Tutorial.png" alt="CSS Tutorial Banner">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/XML%20Tutorial.png" alt="XML Tutorial Banner">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/Python%20tutorial.png" alt="Python Tutorial Banner">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/Python%20Arrays.png" alt="Python Arrays Banner">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/C%20Generics.jpg" alt="C# Generics Banner">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/CSharp%20Anonymous%20Function.png" alt="C# Anonymous Function Banner">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/CSharp%20Anonymous%20Types.png" alt="C# Anonymous Types Banner">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/CSharp%20Textwriter.png" alt="C# TextWriter Banner">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/website.png" alt="Website Banner Design">
        </div>
      </div>

    </div>
  </section>

</body>
</html>
