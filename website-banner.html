<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">

  <title>Website Banners — Udhav Khera</title>

  <style>
    body {
      margin: 0;
      font-family: "DM Sans", sans-serif;
      background: #0f0f0f;
      color: white;
    }

    /* WORK CARD */
    .work-card {
      max-width: 350px;
      margin: 40px auto;
    }

    .work-card-inner {
      text-decoration: none;
      color: white;
      display: block;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .work-card-inner:hover {
      transform: translateY(-6px);
      border-color: #ff6b35;
    }

    .work-thumb {
      position: relative;
    }

    .work-thumb img {
      width: 100%;
      display: block;
    }

    .work-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: 0.3s;
    }

    .work-card-inner:hover .work-overlay {
      opacity: 1;
    }

    .work-meta {
      padding: 15px;
    }

    .work-tag {
      font-size: 12px;
      color: #ff6b35;
    }

    /* GALLERY */
    .gallery-section {
      padding: 80px 20px;
    }

    .vlog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .vlog-card {
      border-radius: 20px;
      overflow: hidden;
      background: #1a1a1a;
    }

    .vlog-thumb img {
      width: 100%;
      object-fit: contain;
    }
  </style>
</head>

<body>

  <!-- ✅ WORK CARD (TOP SECTION) -->
  <article class="work-card">
    <a href="#banners" class="work-card-inner">
      <div class="work-thumb">
        <img src="./asset/images/website.png" alt="Website Banners">
        <div class="work-overlay">
          <span>View Project <i class="fas fa-arrow-right"></i></span>
        </div>
      </div>

      <div class="work-meta">
        <span class="work-tag">Web Design</span>
        <h3>Website Banners</h3>
        <p>Professional banners for brand identity and web presence.</p>
      </div>
    </a>
  </article>

  <!-- ✅ GALLERY SECTION -->
  <section class="gallery-section" id="banners">
    <div class="vlog-grid">

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/CSS%20Tutorial.png">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/XML%20Tutorial.png">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/Python%20tutorial.png">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/Python%20Arrays.png">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/C%20Generics.jpg">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/CSharp%20Anonymous%20Function.png">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/CSharp%20Anonymous%20Types.png">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/CSharp%20Textwriter.png">
        </div>
      </div>

      <div class="vlog-card">
        <div class="vlog-thumb">
          <img src="./asset/images/website.png">
        </div>
      </div>

    </div>
  </section>

</body>
</html>
